name: Create release tag from version bump
run-name: >-
  Create release tag from ${{ github.ref_name }}

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Verify version files match
        id: version
        run: node scripts/release-metadata.mjs verify-version-files

      - name: Check whether release tag already exists
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Release tag ${TAG} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
