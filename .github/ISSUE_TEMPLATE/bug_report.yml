name: Bug report
description: Report a reproducible problem in the @qredex/server Node.js SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest useful reproduction, including SDK version and code snippet.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, package version, environment, and any relevant runtime details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or errors
      description: Include relevant errors, request IDs, or traces with secrets removed.
